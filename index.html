<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pab.png" />
    <link rel="apple-touch-icon" href="/ios.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Points Are Bad" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Points Are Bad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #080810; }
      #splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      #splash .words {
        display: flex;
        gap: 0.25em;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-size: clamp(26px, 7vw, 48px);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--sp-text, #e8e4d9);
      }
      #splash .w1 {
        opacity: 0;
        transform: translateX(-50px);
        animation: slideR 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      }
      #splash .w2 {
        opacity: 0;
        transform: translateX(50px);
        animation: slideL 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      }
      #splash .sub {
        font-family: monospace;
        font-size: 10px;
        letter-spacing: 0.35em;
        color: var(--sp-text, #e8e4d9);
        opacity: 0;
        margin-top: 14px;
        text-transform: lowercase;
        animation: fadeUp 0.35s ease 0.65s forwards;
      }
      #splash .dots {
        display: flex;
        gap: 5px;
        margin-top: 28px;
      }
      #splash .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--sp-accent, #6c5eff);
        opacity: 0;
        animation: dotP 1.2s ease-in-out infinite;
      }
      #splash .dot:nth-child(1) { animation-delay: 0.8s; }
      #splash .dot:nth-child(2) { animation-delay: 1.0s; }
      #splash .dot:nth-child(3) { animation-delay: 1.2s; }
      @keyframes slideR { to { opacity: 1; transform: translateX(0); } }
      @keyframes slideL { to { opacity: 1; transform: translateX(0); } }
      @keyframes fadeUp { to { opacity: 0.4; } }
      @keyframes dotP {
        0%, 100% { opacity: 0.25; transform: scaleY(1); }
        50% { opacity: 0.7; transform: scaleY(1.5); }
      }
    </style>
    <script>
      try {
        var t = localStorage.getItem("theme");
        var valid = ["dark","light","excel","terminal","nord","pitch","velvet","clarity","index"];
        var themes = {
          light:   {bg:"#f4f1e8",text:"#1a1814",accent:"#111"},
          index:   {bg:"#f6f6f7",text:"#121417",accent:"#15181c"},
          nord:    {bg:"#2e3440",text:"#eceff4",accent:"#88c0d0"},
          pitch:   {bg:"#0d1f0d",text:"#d4ecd4",accent:"#4caf50"},
          velvet:  {bg:"#120816",text:"#f7d6ea",accent:"#f472b6"},
          clarity: {bg:"#111",   text:"#f1f1f1",accent:"#d7d7d7"},
          terminal:{bg:"#000000",text:"#00cc44",accent:"#00cc44"},
          excel:   {bg:"#ffffff",text:"#1a1a1a",accent:"#107c41"},
        };
        if (t && valid.includes(t)) {
          document.documentElement.setAttribute("data-theme", t);
          var c = themes[t] || {bg:"#080810",text:"#e8e4d9",accent:"#6c5eff"};
          document.body.style.background = c.bg;
          document.documentElement.style.setProperty("--sp-text", c.text);
          document.documentElement.style.setProperty("--sp-accent", c.accent);
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="words">
          <span class="w1">POINTS</span>
          <span class="w2">ARE BAD</span>
        </div>
        <div class="sub">pab.wtf</div>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
