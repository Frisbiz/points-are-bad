<!doctype html>

    <title>Points Are Bad</title>
    <style>
      body { margin: 0; background: #080810; }
      #splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 18px;
      }
      #splash .ball { width: 48px; height: 48px; animation: spin 1.1s linear infinite; }
      #splash .lbl {
        color: #e8e4d9;
        font-family: monospace;
        font-size: 13px;
        letter-spacing: .12em;
        opacity: .45;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      try {
        var t = localStorage.getItem("theme");
        var valid = ["dark","light","excel","terminal","nord","pitch"];
        if (t && valid.includes(t)) document.documentElement.setAttribute("data-theme", t);
      } catch(e) {}
    </script>
  </head>
